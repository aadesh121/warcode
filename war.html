<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WARCODE · conflict encyclopedia</title>
  <style>
    /* Wikipedia-inspired clean, mature design */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f6f6f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Lato', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: #202122;
    }

    /* Main container */
    .warcode-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      min-height: 100vh;
    }

    /* Wikipedia header */
    .war-header {
      background: #f8f9fa;
      border-bottom: 1px solid #a2a9b1;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .war-header h1 {
      font-family: 'Linux Libertine', 'Georgia', 'Times New Roman', serif;
      font-size: 2.2rem;
      font-weight: normal;
      color: #000;
      border-bottom: none;
    }

    .war-header h1 i {
      color: #ba0000;
      font-style: italic;
      font-weight: 300;
    }

    .war-header span {
      color: #54595d;
      font-size: 0.9rem;
    }

    /* Main content area */
    .main-content {
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Selection area */
    .selection-area {
      background: #f8f9fa;
      border: 1px solid #a2a9b1;
      padding: 2rem;
      margin-bottom: 2rem;
      border-radius: 4px;
    }

    .selection-title {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #000;
      border-bottom: 1px solid #a2a9b1;
      padding-bottom: 0.5rem;
    }

    .selector-panel {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .country-selector {
      flex: 1 1 300px;
    }

    .selector-label {
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #202122;
    }

    /* Search input */
    .country-search {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid #a2a9b1;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
      background: white;
      transition: border-color 0.1s;
      margin-bottom: 0.5rem;
    }

    .country-search:focus {
      border-color: #36c;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
    }

    /* Selected country display */
    .selected-display {
      background: #eaf3ff;
      border: 1px solid #a2a9b1;
      border-radius: 4px;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .selected-display .country-name {
      font-weight: bold;
      color: #000;
    }

    .unselect-btn {
      color: #36c;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 0.9rem;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
    }

    .unselect-btn:hover {
      background: rgba(0,0,0,0.05);
      text-decoration: underline;
    }

    /* Dropdown */
    .select-dropdown {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #a2a9b1;
      border-radius: 4px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .country-item {
      padding: 0.6rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #eaecf0;
    }

    .country-item:last-child {
      border-bottom: none;
    }

    .country-item:hover {
      background: #eaf3ff;
    }

    .country-item.disabled {
      color: #72777d;
      background: #f8f9fa;
      cursor: not-allowed;
    }

    /* Action button */
    .action-area {
      text-align: center;
      margin: 2rem 0;
    }

    .breakdown-btn {
      background: #f8f9fa;
      border: 1px solid #a2a9b1;
      border-radius: 4px;
      padding: 0.8rem 2.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: #202122;
      cursor: pointer;
      transition: all 0.1s;
    }

    .breakdown-btn:hover:not(:disabled) {
      background: #ffffff;
      border-color: #36c;
    }

    .breakdown-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .warning-message {
      color: #72777d;
      margin-top: 0.5rem;
      font-style: italic;
    }

    /* ===== NEW PAGE STYLES ===== */
    .new-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 10000;
      overflow-y: auto;
      display: none;
    }

    .new-page-header {
      background: #f8f9fa;
      border-bottom: 1px solid #a2a9b1;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10001;
    }

    .new-page-header h2 {
      font-family: 'Linux Libertine', 'Georgia', 'Times New Roman', serif;
      font-size: 1.8rem;
      font-weight: normal;
      color: #000;
    }

    .close-page-btn {
      background: none;
      border: 1px solid #a2a9b1;
      border-radius: 4px;
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      color: #202122;
    }

    .close-page-btn:hover {
      background: #ffffff;
      border-color: #36c;
    }

    .new-page-content {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 2rem 4rem;
    }

    .new-page-article-title {
      font-family: 'Linux Libertine', 'Georgia', 'Times New Roman', serif;
      font-size: 2.2rem;
      border-bottom: 1px solid #a2a9b1;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      font-weight: normal;
    }

    .new-page-article-body {
      font-size: 1rem;
      line-height: 1.8;
    }

    .new-page-article-body p {
      margin: 1rem 0;
    }

    .new-page-footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eaecf0;
      color: #54595d;
      font-size: 0.9rem;
    }

    /* Mobile adjustments */
    @media (max-width: 720px) {
      .war-header {
        padding: 1rem;
      }
      .main-content {
        padding: 1rem;
      }
      .selector-panel {
        flex-direction: column;
        gap: 1rem;
      }
      .new-page-header {
        padding: 1rem;
      }
      .new-page-content {
        padding: 0 1rem 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- MAIN PAGE -->
  <div class="warcode-container">
    <!-- Wikipedia-style header -->
    <div class="war-header">
      <h1>WARCODE <i>·</i> conflict encyclopedia</h1>
      <span>195 countries · 37,050 possible conflicts</span>
    </div>

    <!-- Main content area -->
    <div class="main-content">
      <!-- Selection area -->
      <div class="selection-area">
        <div class="selection-title">Select two countries</div>
        
        <div class="selector-panel">
          <!-- First country selector -->
          <div class="country-selector" id="selectorA">
            <div class="selector-label">First Country</div>
            <div id="selectorADynamic"></div>
            <div class="selected-hint" id="hintA" style="font-size: 0.9rem; color: #54595d; margin-top: 0.5rem;">
              <span id="strongHintA">none selected</span>
            </div>
          </div>

          <!-- Second country selector -->
          <div class="country-selector" id="selectorB">
            <div class="selector-label">Second Country</div>
            <div id="selectorBDynamic"></div>
            <div class="selected-hint" id="hintB" style="font-size: 0.9rem; color: #54595d; margin-top: 0.5rem;">
              <span id="strongHintB">none selected</span>
            </div>
          </div>
        </div>

        <!-- Action area -->
        <div class="action-area">
          <button class="breakdown-btn" id="breakdownBtn" disabled>Read full article</button>
          <div class="warning-message" id="warningMsg">Select two different countries to continue</div>
        </div>
      </div>
    </div>
  </div>

  <!-- NEW PAGE (opens when clicking Read full article) -->
  <div class="new-page" id="newPage">
    <div class="new-page-header">
      <h2>WARCODE · conflict archive</h2>
      <button class="close-page-btn" id="closeNewPage">← Return to selection</button>
    </div>
    <div class="new-page-content">
      <div class="new-page-article-title" id="newPageTitle"></div>
      <div class="new-page-article-body" id="newPageBody"></div>
      <div class="new-page-footer">— WARCODE · verified sources · last updated 2026 —</div>
    </div>
  </div>

  <script>
    (function() {
      // =====================================================================
      // 195 COUNTRIES - Full names
      // =====================================================================
      const countriesData = [
        "Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia", "Australia", "Austria",
        "Azerbaijan", "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan",
        "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso", "Burundi", "Cabo Verde", "Cambodia",
        "Cameroon", "Canada", "Central African Republic", "Chad", "Chile", "China", "Colombia", "Comoros", "Congo", "Costa Rica",
        "Côte d'Ivoire", "Croatia", "Cuba", "Cyprus", "Czech Republic", "Denmark", "Djibouti", "Dominica", "Dominican Republic", "Ecuador",
        "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia", "Fiji", "Finland", "France",
        "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau",
        "Guyana", "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland",
        "Israel", "Italy", "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Korea, North", "Korea, South",
        "Kosovo", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein",
        "Lithuania", "Luxembourg", "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania",
        "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar",
        "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger", "Nigeria", "North Macedonia", "Norway",
        "Oman", "Pakistan", "Palau", "Palestine", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland",
        "Portugal", "Qatar", "Romania", "Russia", "Rwanda", "Saint Kitts and Nevis", "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino",
        "Sao Tome and Principe", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands",
        "Somalia", "South Africa", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria",
        "Taiwan", "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey",
        "Turkmenistan", "Tuvalu", "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan", "Vanuatu",
        "Vatican City", "Venezuela", "Vietnam", "Yemen", "Zambia", "Zimbabwe"
      ];

      // =====================================================================
      // 📝 CUSTOM ARTICLES FOR EACH COUNTRY PAIR
      // Add as many as you want. Format: "CountryA|CountryB" => "Full article text"
      // =====================================================================
      const pairArticles = new Map();

      // EUROPE
      pairArticles.set("Russia|Ukraine", `The Russian invasion of Ukraine entered its fourth year in 2026. The conflict, which began as a full-scale invasion in February 2022, has evolved into a war of attrition along a 1,200-kilometer front line from Kharkiv to Kherson. 

Military analysts estimate combined casualties exceed 500,000. The war has seen extensive use of drones, electronic warfare, and long-range missiles. Ukraine continues to receive military aid from NATO countries, while Russia has shifted to a war economy. 

The Black Sea remains a key battleground, with Ukraine's naval drones challenging Russian dominance. Peace negotiations remain stalled, with both sides holding firm on territorial demands.`);

      pairArticles.set("Ukraine|Russia", `Ukraine's defense against Russian aggression has been defined by resilience and adaptation. After successful counter-offensives in 2022 that liberated Kharkiv and Kherson, the front lines stabilized. 

The country has developed one of the world's most sophisticated drone industries, producing long-range attack drones that strike deep inside Russia. Western-supplied F-16s now patrol Ukrainian skies, though Russia maintains air superiority in some sectors.

Civilian infrastructure continues to be targeted, with the energy grid facing systematic attacks. Reconstruction costs are estimated at $500 billion. Ukraine's path to NATO membership remains a contentious issue.`);

      // MIDDLE EAST
      pairArticles.set("Israel|Palestine", `The Gaza conflict remains one of the world's most intractable disputes. The current phase began with the October 7, 2023 attacks, triggering a massive Israeli military response. Gaza's infrastructure has been devastated, with reconstruction yet to begin.

In the West Bank, settler violence has increased, and IDF operations are frequent. Regional dynamics shifted with Saudi Arabia pausing normalization talks. Hezbollah in Lebanon maintains low-intensity conflict with Israel along the northern border.

International efforts focus on a two-state solution, though implementation remains distant. The humanitarian situation in Gaza continues to draw global concern, with access to food, water, and medical care severely restricted.`);

      pairArticles.set("Palestine|Israel", `From the Palestinian perspective, the conflict represents decades of displacement and occupation. The Gaza Strip faces what many international organizations describe as a humanitarian catastrophe.

Palestinian factions remain divided between Fatah in the West Bank and Hamas in Gaza, complicating peace efforts. Rocket attacks from Gaza and armed operations in the West Bank continue to draw Israeli responses.

The Palestinian Authority's international standing has grown, with increased UN recognition, but tangible progress toward statehood remains elusive. Refugee communities across the Middle East maintain hope for right of return.`);

      // ASIA
      pairArticles.set("India|Pakistan", `The Kashmir dispute continues to define India-Pakistan relations. The Line of Control sees regular ceasefire violations, with both sides accusing each other of cross-border terrorism.

Water disputes over the Indus River system remain unresolved, with India's upstream projects causing concern in downstream Pakistan. Trade between the nuclear-armed neighbors remains suspended since 2019.

International mediation efforts have failed to restart dialogue. Both countries continue to modernize their nuclear arsenals. The Siachen Glacier conflict, though frozen, remains unresolved.`);

      pairArticles.set("Pakistan|India", `From Pakistan's perspective, the dispute over Kashmir remains the core issue preventing normalization. Pakistan accuses India of human rights violations in Indian-administered Kashmir.

The China-Pakistan Economic Corridor (CPEC) has strengthened Pakistan's strategic position. Border skirmishes in the disputed region continue periodically. Diplomatic missions operate at reduced capacity.

Pakistan seeks international arbitration on Kashmir, while India insists on bilateral resolution. Military spending on both sides continues to rise, with no signs of de-escalation.`);

      // EAST ASIA
      pairArticles.set("China|Taiwan", `Cross-strait tensions have escalated to their highest point since the 1996 crisis. China's military exercises around Taiwan have become routine, with the People's Liberation Army conducting frequent incursions into Taiwan's Air Defense Identification Zone.

The United States continues arms sales to Taiwan while maintaining strategic ambiguity. China views these sales as interference in internal affairs. Economic interdependence remains high, with Taiwanese semiconductor giant TSMC caught in the geopolitical crossfire.

International reactions to potential Chinese action remain divided. Japan has strengthened its defense posture, while European nations call for restraint.`);

      pairArticles.set("Taiwan|China", `Taiwan maintains its defense posture through asymmetric warfare strategy. The island has upgraded its F-16 fleet and developed indigenous submarines and missiles.

Democratic processes continue uninterrupted, with regular elections. International support for Taiwan's participation in global forums has grown. Economic ties with China remain strong despite political tensions.

The status quo, while tense, has persisted. Taiwan's government emphasizes its readiness to defend itself while keeping dialogue channels open.`);

      // AFRICA
      pairArticles.set("Sudan|Sudan", `The Sudanese civil war between the Sudanese Armed Forces (SAF) and the Rapid Support Forces (RSF) has created Africa's largest displacement crisis. Khartoum has been devastated by urban warfare.

Darfur has seen a resurgence of ethnic violence. Foreign involvement includes UAE support for RSF and Russian mercenary presence. Peace talks in Jeddah have repeatedly stalled.

Famine threatens millions. Neighboring countries struggle with refugee influx. The conflict has drawn in regional powers, with Egypt supporting SAF and Libya providing routes for RSF supplies.`);

      pairArticles.set("Ethiopia|Ethiopia", `Ethiopia's internal conflicts continue despite the 2022 Tigray peace agreement. The Amhara region faces an ongoing insurgency, while Oromia sees regular clashes.

The Grand Ethiopian Renaissance Dam (GERD) remains a source of tension with Egypt and Sudan. Drought in the Horn of Africa exacerbates existing conflicts over resources.

Federal authority remains contested in multiple regions. Eritrea's involvement in Tigray has created additional complexity. International aid flows have resumed but remain insufficient.`);

      // AMERICAS
      pairArticles.set("United States|China", `US-China strategic competition defines contemporary geopolitics. Trade tensions continue with tariffs on hundreds of billions of goods. Technology decoupling has accelerated, with export controls on advanced semiconductors.

Military incidents in the South China Sea and Taiwan Strait risk escalation. Diplomatic expulsions have become routine. Climate cooperation, once a bright spot, has diminished.

Both countries compete for influence in the Global South, with infrastructure investment and debt diplomacy as key tools. The relationship oscillates between managed competition and outright hostility.`);

      pairArticles.set("China|United States", `From Beijing's perspective, the US seeks to contain China's rise. The trade war is viewed as an attempt to slow China's technological development. US arms sales to Taiwan violate the Three Communiquos.

China's Belt and Road Initiative offers alternative development model to US-led institutions. The Global South increasingly looks to China for investment without political conditions.

Strategic competition extends to space, cyber, and artificial intelligence. Both sides maintain communication channels while preparing for long-term competition.`);

      // =====================================================================
      // DEFAULT FALLBACK
      // =====================================================================
      function getDefaultArticle(countryA, countryB) {
        return `No detailed article is currently available for the conflict between ${countryA} and ${countryB}. 

WARCODE editors are working to add comprehensive coverage of this bilateral relationship. In the meantime, you can explore other country pairs or check back later for updates.

This placeholder will be replaced with a full historical analysis, current conflict assessment, and geopolitical context once our research team completes the documentation.`;
      }

      // =====================================================================
      // UI STATE
      // =====================================================================
      let selectedA = null;
      let selectedB = null;
      
      // Store filter values separately
      let filterA = '';
      let filterB = '';

      // DOM elements
      const dynamicA = document.getElementById('selectorADynamic');
      const dynamicB = document.getElementById('selectorBDynamic');
      const strongHintA = document.getElementById('strongHintA');
      const strongHintB = document.getElementById('strongHintB');
      const breakdownBtn = document.getElementById('breakdownBtn');
      const warningMsg = document.getElementById('warningMsg');
      
      // New page elements
      const newPage = document.getElementById('newPage');
      const closeNewPage = document.getElementById('closeNewPage');
      const newPageTitle = document.getElementById('newPageTitle');
      const newPageBody = document.getElementById('newPageBody');

      // =====================================================================
      // HELPER FUNCTIONS
      // =====================================================================
      function getArticleForPair(a, b) {
        const key = `${a}|${b}`;
        if (pairArticles.has(key)) {
          return pairArticles.get(key);
        }
        return getDefaultArticle(a, b);
      }

      // Update hints and button state
      function updateUI() {
        strongHintA.innerText = selectedA ? selectedA : 'none selected';
        strongHintB.innerText = selectedB ? selectedB : 'none selected';

        const bothValid = selectedA && selectedB && (selectedA !== selectedB);
        breakdownBtn.disabled = !bothValid;

        if (!bothValid) {
          if (selectedA && selectedB && selectedA === selectedB) {
            warningMsg.innerText = 'Please select two different countries';
          } else {
            warningMsg.innerText = 'Select two different countries to continue';
          }
        } else {
          warningMsg.innerText = '✓ Ready to read';
        }
      }

      // Render dropdown for a specific side
      function renderDropdown(side, filterValue) {
        const isA = (side === 'A');
        const dropdownEl = document.getElementById(`dropdown-${side}`);
        if (!dropdownEl) return;

        const otherSelected = isA ? selectedB : selectedA;
        
        // Filter countries based on search
        const filtered = countriesData.filter(country => 
          country.toLowerCase().includes(filterValue.toLowerCase())
        );

        if (filtered.length === 0) {
          dropdownEl.innerHTML = `<div class="country-item" style="color: #72777d;">No countries found</div>`;
          return;
        }

        let dropdownHtml = '';
        filtered.forEach(country => {
          const isDisabled = (country === otherSelected);
          dropdownHtml += `<div class="country-item ${isDisabled ? 'disabled' : ''}" 
                                 data-country="${country}" data-side="${side}">${country}</div>`;
        });
        dropdownEl.innerHTML = dropdownHtml;

        // Add click handlers
        dropdownEl.querySelectorAll('.country-item:not(.disabled)').forEach(item => {
          item.addEventListener('click', () => {
            const country = item.dataset.country;
            if (side === 'A') {
              selectedA = country;
              filterA = ''; // Clear filter after selection
            } else {
              selectedB = country;
              filterB = '';
            }
            renderSelectorSide(side); // Re-render to show selected display
            renderSelectorSide(side === 'A' ? 'B' : 'A'); // Re-render other side to update disabled items
            updateUI();
          });
        });
      }

      // Render a selector side (either selected display or search + dropdown)
      function renderSelectorSide(side) {
        const isA = (side === 'A');
        const container = isA ? dynamicA : dynamicB;
        const selected = isA ? selectedA : selectedB;
        const filterValue = isA ? filterA : filterB;

        if (selected) {
          // Show selected display
          container.innerHTML = `
            <div class="selected-display">
              <span class="country-name">${selected}</span>
              <span class="unselect-btn" id="unselect-${side}">change</span>
            </div>
          `;

          document.getElementById(`unselect-${side}`).addEventListener('click', () => {
            if (side === 'A') {
              selectedA = null;
              filterA = '';
            } else {
              selectedB = null;
              filterB = '';
            }
            renderSelectorSide(side);
            renderSelectorSide(side === 'A' ? 'B' : 'A');
            updateUI();
          });
        } else {
          // Show search + dropdown
          const searchId = `search-${side}`;
          const dropdownId = `dropdown-${side}`;
          
          container.innerHTML = `
            <input type="text" class="country-search" id="${searchId}" 
                   placeholder="Type any country name..." value="${filterValue}" autocomplete="off">
            <div class="select-dropdown" id="${dropdownId}"></div>
          `;

          const searchInput = document.getElementById(searchId);
          
          // Render initial dropdown
          renderDropdown(side, filterValue);

          // Search input handler
          searchInput.addEventListener('input', (e) => {
            const newFilter = e.target.value;
            
            // Update filter value
            if (side === 'A') {
              filterA = newFilter;
            } else {
              filterB = newFilter;
            }
            
            // Re-render only the dropdown
            renderDropdown(side, newFilter);
          });
        }
      }

      // Open new page with article
      function openNewPage() {
        if (!selectedA || !selectedB || selectedA === selectedB) return;

        const articleText = getArticleForPair(selectedA, selectedB);
        
        newPageTitle.innerText = `${selectedA} – ${selectedB} conflict`;
        newPageBody.innerHTML = `<p>${articleText.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p>`;
        
        // Show the new page
        newPage.style.display = 'block';
        
        // Scroll to top of new page
        newPage.scrollTop = 0;
        
        // Disable body scroll
        document.body.style.overflow = 'hidden';
      }

      // Close new page
      function closeNewPageFunc() {
        newPage.style.display = 'none';
        document.body.style.overflow = 'auto';
      }

      // Initial render
      function init() {
        renderSelectorSide('A');
        renderSelectorSide('B');
        updateUI();
      }

      // Event listeners
      breakdownBtn.addEventListener('click', openNewPage);
      closeNewPage.addEventListener('click', closeNewPageFunc);

      // Close with Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && newPage.style.display === 'block') {
          closeNewPageFunc();
        }
      });

      // Start the app
      init();
    })();

  </script>
</body>
</html>
